name: Release

on:
  push:
    tags: ['v*']

jobs:
  linux:
    name: linux-latest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ubuntu-latest-release

      - name: Install cross-compilation toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang lld mingw-w64 \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Build bwslc (native linux/x64)
        env:
          CXX: ccache clang++
        run: BWSL_VERSION="${GITHUB_REF_NAME#v}" make build

      - name: Build bwslc (cross linux/arm64)
        env:
          CXX: ccache clang++
        run: BWSL_VERSION="${GITHUB_REF_NAME#v}" make build TARGET_OS=linux TARGET_ARCH=arm64

      - name: Build bwslc (cross windows/x64)
        env:
          CXX: ccache clang++
        run: BWSL_VERSION="${GITHUB_REF_NAME#v}" make build TARGET_OS=windows TARGET_ARCH=x86_64

      - name: Package binaries
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cp build/bwslc "dist/bwslc-linux-x64-$version"
          cp build/bwslc-linux-arm64 "dist/bwslc-linux-arm64-$version"
          cp build/bwslc-windows-x86_64.exe "dist/bwslc-windows-x64-$version.exe"

      - name: Upload Linux x64 binary
        uses: actions/upload-artifact@v7
        with:
          name: bwslc-linux-x64
          path: dist/bwslc-linux-x64-*
          if-no-files-found: error

      - name: Upload Linux arm64 binary
        uses: actions/upload-artifact@v7
        with:
          name: bwslc-linux-arm64
          path: dist/bwslc-linux-arm64-*
          if-no-files-found: error

      - name: Upload Windows x64 binary
        uses: actions/upload-artifact@v7
        with:
          name: bwslc-windows-x64
          path: dist/bwslc-windows-x64-*
          if-no-files-found: error

  macos:
    name: macos-latest
    needs: linux
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: macos-latest-release

      - name: Build bwslc
        env:
          CXX: ccache clang++
        run: BWSL_VERSION="${GITHUB_REF_NAME#v}" make build

      - name: Package macOS binary
        id: package
        run: |
          version="${GITHUB_REF_NAME#v}"
          arch=$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')
          artifact_name="bwslc-macos-$arch"
          mkdir -p dist
          cp build/bwslc "dist/$artifact_name-$version"
          chmod +x "dist/$artifact_name-$version"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Upload macOS binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: dist/bwslc-*
          if-no-files-found: error

  release:
    name: Release
    needs: [linux, macos]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download release binaries
        uses: actions/download-artifact@v8
        with:
          pattern: bwslc-*
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --title "BWSL $version Open Beta" \
              --generate-notes \
              --verify-tag
          fi

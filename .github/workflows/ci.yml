name: CI

on:
  push:
    branches: [master]
    paths:
      - 'core/**'
      - 'phases/**'
      - 'tools/**'
      - 'modules/**'
      - 'tests/**'
      - 'vendor/**'
      - 'Makefile'
      - 'build.bat'
      - 'make.bat'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'phases/**'
      - 'tools/**'
      - 'modules/**'
      - 'tests/**'
      - 'vendor/**'
      - 'Makefile'
      - 'build.bat'
      - 'make.bat'
      - '.github/workflows/ci.yml'
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: linux-latest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ubuntu-latest

      - name: Build bwslc
        env:
          CXX: ccache clang++
        run: make bwslc

      - name: Run regression tests
        env:
          CXX: ccache clang++
        run: make test

  macos:
    name: macos-latest
    needs: linux
    if: github.ref == 'refs/heads/master' || (github.event_name == 'pull_request_review' && github.event.review.state == 'approved')
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: macos-latest

      - name: Build bwslc
        env:
          CXX: ccache clang++
        run: make bwslc

      - name: Run regression tests
        env:
          CXX: ccache clang++
        run: make test

  windows:
    name: windows-latest
    needs: linux
    if: github.ref == 'refs/heads/master' || (github.event_name == 'pull_request_review' && github.event.review.state == 'approved')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up sccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: windows-latest
          variant: sccache

      - name: Build SPIRV-Tools CLI
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE -replace '\\', '/'
          $spirvHeadersDir = "$workspace/vendor/SPIRV-Headers"
          $spirvToolsDir = "$workspace/build/spirv-tools"
          cmake -S vendor/SPIRV-Tools -B build/spirv-tools `
            -DSPIRV_WERROR=OFF `
            -DSPIRV_SKIP_TESTS=ON `
            -DCMAKE_C_COMPILER_LAUNCHER=sccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache `
            -DSPIRV-Headers_SOURCE_DIR="$spirvHeadersDir"
          cmake --build build/spirv-tools --config Release --target spirv-dis spirv-val --parallel
          "$spirvToolsDir/tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$spirvToolsDir/tools/Release" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build with MSVC
        shell: cmd
        run: build.bat bwslc

      - name: Run regression tests
        shell: cmd
        run: build.bat test

name: CI

on:
  push:
    branches: [master]
    paths:
      - 'core/**'
      - 'phases/**'
      - 'tools/**'
      - 'modules/**'
      - 'tests/**'
      - 'vendor/**'
      - 'Makefile'
      - 'build.bat'
      - 'make.bat'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'phases/**'
      - 'tools/**'
      - 'modules/**'
      - 'tests/**'
      - 'vendor/**'
      - 'Makefile'
      - 'build.bat'
      - 'make.bat'
      - '.github/workflows/ci.yml'
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: linux-latest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ubuntu-latest

      - name: Build bwslc
        run: make build

      - name: Run regression tests
        run: make test

  macos:
    name: macos-latest
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: macos-latest

      - name: Build bwslc
        run: make build

      - name: Run regression tests
        run: make test

  windows:
    name: windows-latest
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          update: true
          install: >-
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-cmake
            mingw-w64-clang-x86_64-python
            mingw-w64-clang-x86_64-sccache
            make

      - name: Build bwslc
        shell: msys2 {0}
        run: make build

      - name: Run regression tests
        shell: pwsh
        run: python tests/run_tests.py

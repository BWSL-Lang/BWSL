name: CI

on:
  push:
  pull_request:

jobs:
  unix:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build SPIRV-Tools CLI
        run: |
          cmake -S vendor/SPIRV-Tools -B build/spirv-tools \
            -DCMAKE_BUILD_TYPE=Release \
            -DSPIRV_WERROR=OFF \
            -DSPIRV_SKIP_TESTS=ON \
            -DSPIRV-Headers_SOURCE_DIR="$GITHUB_WORKSPACE/vendor/SPIRV-Headers"
          cmake --build build/spirv-tools --target spirv-dis spirv-val --parallel
          echo "$GITHUB_WORKSPACE/build/spirv-tools/tools" >> "$GITHUB_PATH"

      - name: Build bwslc
        run: make bwslc

      - name: Run regression tests
        run: make test

  windows:
    name: windows-latest
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build SPIRV-Tools CLI
        shell: pwsh
        run: |
          cmake -S vendor/SPIRV-Tools -B build/spirv-tools `
            -DSPIRV_WERROR=OFF `
            -DSPIRV_SKIP_TESTS=ON `
            -DSPIRV-Headers_SOURCE_DIR="$env:GITHUB_WORKSPACE/vendor/SPIRV-Headers"
          cmake --build build/spirv-tools --config Release --target spirv-dis spirv-val --parallel
          "$env:GITHUB_WORKSPACE/build/spirv-tools/tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$env:GITHUB_WORKSPACE/build/spirv-tools/tools/Release" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build with MSVC
        shell: cmd
        run: build.bat bwslc

      - name: Run regression tests
        shell: cmd
        run: build.bat test

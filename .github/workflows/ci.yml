name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  BWSL_OPEN_BETA_VERSION: "0.7.5"

jobs:
  unix:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.os }}

      - name: Build bwslc
        run: make bwslc

      - name: Run regression tests
        run: make test

      - name: Package Unix binary
        id: package
        shell: bash
        run: |
          version="$BWSL_OPEN_BETA_VERSION"
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          fi

          case "$RUNNER_OS" in
            Linux) os="linux" ;;
            macOS) os="macos" ;;
            *) os="$(echo "$RUNNER_OS" | tr '[:upper:]' '[:lower:]')" ;;
          esac

          case "$(uname -m)" in
            x86_64|amd64) arch="x64" ;;
            arm64|aarch64) arch="arm64" ;;
            *) arch="$(uname -m)" ;;
          esac

          artifact_name="bwslc-$os-$arch"
          mkdir -p dist
          cp build/bwslc "dist/$artifact_name-$version"
          chmod +x "dist/$artifact_name-$version"
          echo "artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Upload Unix binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: dist/bwslc-*
          if-no-files-found: error

  windows:
    name: windows-latest
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build SPIRV-Tools CLI
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE -replace '\\', '/'
          $spirvHeadersDir = "$workspace/vendor/SPIRV-Headers"
          $spirvToolsDir = "$workspace/build/spirv-tools"
          cmake -S vendor/SPIRV-Tools -B build/spirv-tools `
            -DSPIRV_WERROR=OFF `
            -DSPIRV_SKIP_TESTS=ON `
            -DSPIRV-Headers_SOURCE_DIR="$spirvHeadersDir"
          cmake --build build/spirv-tools --config Release --target spirv-dis spirv-val --parallel
          "$spirvToolsDir/tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$spirvToolsDir/tools/Release" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build with MSVC
        shell: cmd
        run: build.bat bwslc

      - name: Run regression tests
        shell: cmd
        run: build.bat test

      - name: Package Windows binary
        shell: pwsh
        run: |
          $version = $env:BWSL_OPEN_BETA_VERSION
          if ($env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME -match '^v?(.+)$') {
            $version = $Matches[1]
          }

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build\bwslc.exe "dist\bwslc-windows-x64-$version.exe"

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: bwslc-windows-x64
          path: dist/*.exe
          if-no-files-found: error

  release:
    name: Release
    needs:
      - unix
      - windows
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download CLI binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bwslc-*
          path: dist
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --title "BWSL $version Open Beta" \
              --generate-notes \
              --verify-tag
          fi
